name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: swissarmyhammer/workflows/.github/workflows/swift-ci.yaml@main
    with:
      example-targets: >-
        EchoTool FileAssistant ToolPicking RemoteHTTP
        ElicitingAgent CatalogBrowser DynamicToolset
      docc-target: FoundationModelsMCP
      docc-coverage-script: Scripts/check-docc-coverage.py
